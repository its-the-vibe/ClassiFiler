services:
  classifiler:
    build: .
    # Run the container filesystem as read-only for security.
    read_only: true
    env_file:
      - .env
    environment:
      # Path to the config file inside the container.
      CONFIG_PATH: /etc/classifiler/config.yaml
    volumes:
      # Mount the config file read-only.
      - ./config.yaml:/etc/classifiler/config.yaml:ro
      # Mount the directory where SlackFiler stores downloaded files.
      # Adjust the host path to match your SlackFiler download directories.
      - /path/to/downloads:/downloads:rw
      # Mount the target classification output directories.
      - /path/to/classified:/classified:rw
    networks:
      - redis_net
    restart: unless-stopped

# ClassiFiler expects an external Redis instance reachable on this network.
# Create it with: docker network create redis_net
networks:
  redis_net:
    external: true
